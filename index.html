<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Store with Razorpay Test Payment</title>

<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CVQWXDXF2G"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-CVQWXDXF2G');
</script>

<!-- Razorpay Checkout -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body { font-family: Arial; text-align: center; }
.product, #cart {
  border: 1px solid #ccc;
  padding: 15px;
  margin: 15px;
  width: 250px;
  display: inline-block;
  vertical-align: top;
}
button {
  padding: 8px;
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>My Online Store</h2>

<div class="product">
<h3>Smart Watch</h3>
<p>₹2500</p>
<button onclick="addToCart('SW01','Smart Watch',2500)">Add to Cart</button>
</div>

<div class="product">
<h3>Bluetooth Speaker</h3>
<p>₹1800</p>
<button onclick="addToCart('BS02','Bluetooth Speaker',1800)">Add to Cart</button>
</div>

<div class="product">
<h3>Wireless Earbuds</h3>
<p>₹3200</p>
<button onclick="addToCart('WE03','Wireless Earbuds',3200)">Add to Cart</button>
</div>

<div class="product">
<h3>Fitness Band</h3>
<p>₹1500</p>
<button onclick="addToCart('FB04','Fitness Band',1500)">Add to Cart</button>
</div>

<!-- CART -->
<div id="cart">
<h3>Shopping Cart</h3>
<ul id="cartItems"></ul>
<p><strong>Total: ₹<span id="total">0</span></strong></p>
<button onclick="payNow()">Buy Now</button>
</div>

<script>

let cart = [];
let totalAmount = 0;

function addToCart(id, name, price) {

  cart.push({item_id: id, item_name: name, price: price});
  totalAmount += price;

  document.getElementById("cartItems").innerHTML +=
    "<li>"+name+" - ₹"+price+"</li>";

  document.getElementById("total").innerText = totalAmount;

  gtag('event', 'add_to_cart', {
    currency: 'INR',
    value: price,
    items: [{
      item_id: id,
      item_name: name,
      price: price,
      quantity: 1
    }]
  });
}

function payNow() {

  if(totalAmount === 0){
    alert("Cart is empty!");
    return;
  }

  var options = {
    "key": "rzp_test_xxxxxxxxx",  // 🔴 Replace with your Razorpay TEST Key
    "amount": totalAmount * 100,  // amount in paise
    "currency": "INR",
    "name": "My Online Store",
    "description": "Test Transaction",
    "handler": function (response){

        alert("Payment Successful!");

        gtag('event', 'purchase', {
          transaction_id: response.razorpay_payment_id,
          value: totalAmount,
          currency: "INR",
          items: cart
        });

        cart = [];
        totalAmount = 0;
        document.getElementById("cartItems").innerHTML = "";
        document.getElementById("total").innerText = "0";
    },
    "prefill": {
        "name": "Test User",
        "email": "test@example.com",
        "contact": "9999999999"
    },
    "theme": {
        "color": "#3399cc"
    }
  };

  var rzp1 = new Razorpay(options);

  rzp1.on('payment.failed', function (response){
        alert("Payment Failed!");
        gtag('event', 'payment_failed', {
          value: totalAmount
        });
  });

  rzp1.open();
}

</script>

</body>
</html>
